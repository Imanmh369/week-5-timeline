<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap');

        body { font-family: 'Inter', sans-serif; background: #f4f1ed; color: #2d2926; margin: 0; padding: 60px 20px; }
        .museum-header { text-align: center; margin-bottom: 50px; }
        .museum-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 10px; }

        .controls { display: flex; gap: 20px; justify-content: center; margin-bottom: 60px; }
        .filter-btn { padding: 8px 25px; cursor: pointer; border: 1px solid #c9c5c0; background: transparent; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; transition: 0.4s; color: #555; }
        .filter-btn.active, .filter-btn:hover { background: #2d2926; color: white; border-color: #2d2926; }

        #timeline { width: 100%; height: 200px; display: block; }
        .dot { fill: #a39e99; cursor: pointer; stroke: #f4f1ed; stroke-width: 1px; transition: 0.2s; }
        .dot:hover { fill: #2d2926; r: 7; }
        
        #detail-view { max-width: 900px; margin: 40px auto; display: flex; gap: 40px; padding: 40px; background: white; border: 1px solid #e0ddd9; }
        #detail-img { width: 350px; height: 350px; object-fit: cover; border: 1px solid #eee; }
        #see-more-btn { padding: 10px 20px; cursor: pointer; background: #2d2926; color: white; border: none; font-size: 14px; }

        #modal { overflow-y: auto; padding: 40px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #artist-works-list { position: relative; max-width: 800px; margin: 50px auto; padding-bottom: 50px; }
        #artist-works-list::before { content: ''; position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: #555; margin-left: -1px; }

        .timeline-item { position: relative; width: 45%; background: #fff; padding: 15px; margin-bottom: 30px; border-radius: 8px; display: flex; align-items: center; gap: 15px; animation: fadeIn 0.6s ease forwards; }
        .timeline-item:nth-child(even) { margin-left: auto; }
        .timeline-item:nth-child(odd) { margin-left: 0; }
        .timeline-item::after { content: ''; position: absolute; top: 20px; width: 12px; height: 12px; background: #fff; border: 3px solid #555; border-radius: 50%; }
        .timeline-item:nth-child(even)::after { left: -32px; }
        .timeline-item:nth-child(odd)::after { right: -32px; }

        /* New Image Viewer Styles */
        #image-viewer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:10000; flex-direction:column; align-items:center; justify-content:center; }
        .color-palette { display: flex; gap: 10px; margin-top: 15px; }
        .color-swatch { width: 40px; height: 40px; border-radius: 4px; cursor: pointer; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <div class="museum-header"><h1>Chronicles of Art</h1></div>
    <div class="controls">
        <button class="filter-btn active" onclick="updateView('All', this)">All Eras</button>
        <button class="filter-btn" onclick="updateView('Contemporary', this)">Contemporary</button>
        <button class="filter-btn" onclick="updateView('Modern', this)">Modern</button>
        <button class="filter-btn" onclick="updateView('Impressionism', this)">Impressionism</button>
    </div>

    <svg id="timeline"></svg>
    
    <div id="detail-view">
        <img id="detail-img" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Select an artwork">
        <div>
            <h2 id="detail-title">Select a point in time</h2>
            <button id="see-more-btn">See more by this artist</button>
        </div>
    </div>

    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999;">
        <button onclick="document.getElementById('modal').style.display='none'" style="float:right; background:white; border:none; padding:10px 20px; cursor:pointer; font-weight:bold;">✕ Close</button>
        <h2 id="modal-artist-name" style="color:white; text-align:center; padding-top:20px;"></h2>
        <svg id="artist-timeline" width="100%" height="150" style="display:block; margin:20px auto; max-width: 800px;"></svg>
        <div id="artist-works-list"></div>
    </div>

    <!-- Image Viewer -->
    <div id="image-viewer">
        <button onclick="document.getElementById('image-viewer').style.display='none'" style="position:absolute; top:20px; right:20px; padding:10px 20px;">✕ Close</button>
        <img id="full-size-img" style="max-width:80%; max-height:60%; border: 5px solid white;">
        <div id="palette" class="color-palette"></div>
        <p style="color:white; margin-top:10px;">Click a color to copy hex code</p>
    </div>

    <script>
        let allData = [];
        const svg = d3.select("#timeline");
        const margin = { left: 100, right: 100 };

        d3.json("artists.json").then(data => {
            allData = data;
            updateView('All');
        });

        function updateView(era, btn) {
            d3.selectAll(".filter-btn").classed("active", false);
            if(btn) d3.select(btn).classed("active", true);

            const filtered = (era === 'All') ? allData : allData.filter(d => d.era === era);
            const minYear = d3.min(filtered, d => d.year) - 10;
            const maxYear = d3.max(filtered, d => d.year) + 10;
            svg.selectAll("*").remove();

            const width = document.body.clientWidth - margin.left - margin.right;
            const xScale = d3.scaleLinear().domain([minYear, maxYear]).range([0, width]);
            const g = svg.append("g").attr("transform", `translate(${margin.left}, 120)`);
            g.append("g").call(d3.axisBottom(xScale).ticks(10).tickFormat(d3.format("d")));

            const dots = g.selectAll(".dot").data(filtered).enter().append("circle").attr("class", "dot").attr("r", 5);
            const simulation = d3.forceSimulation(filtered).force("x", d3.forceX(d => xScale(d.year)).strength(1)).force("y", d3.forceY(-40).strength(0.2)).force("collide", d3.forceCollide(7)).stop();
            for (let i = 0; i < 120; ++i) simulation.tick();

            dots.attr("cx", d => d.x).attr("cy", d => d.y).on("click", (e, d) => {
                d3.select("#detail-img").attr("src", d.image_url);
                d3.select("#detail-title").text(`${d.title} (${d.year})`);
                document.getElementById('see-more-btn').onclick = () => {
                    document.getElementById('modal-artist-name').innerText = `Works by ${d.artist}`;
                    const list = document.getElementById('artist-works-list');
                    list.innerHTML = "";
                    const works = allData.filter(w => w.artist === d.artist).sort((a, b) => a.year - b.year);
                    const first = works[0].year, last = works[works.length - 1].year;
                    const birth = d.birthYear || (first - 20);

                    const mini = d3.select("#artist-timeline");
                    mini.selectAll("*").remove();
                    const mMargin = { left: 50, right: 50 };
                    const mWidth = 800 - mMargin.left - mMargin.right;
                    const mScale = d3.scaleLinear().domain([birth - 5, last + 5]).range([0, mWidth]);
                    const gMini = mini.append("g").attr("transform", `translate(${mMargin.left}, 0)`);

                    gMini.append("g").attr("transform", "translate(0, 30)").call(d3.axisTop(mScale).ticks(5).tickFormat(d3.format("d"))).selectAll("text").style("font-size", "14px").style("fill", "#ffffff");
                    gMini.select(".domain").style("stroke", "#ffffff");
                    gMini.selectAll(".tick line").style("stroke", "#ffffff");

                    const tooltip = mini.append("text").attr("fill", "white").style("font-size", "16px").style("font-weight", "bold").attr("text-anchor", "middle").style("opacity", 0);
                    gMini.append("line").attr("x1", 0).attr("y1", 90).attr("x2", mWidth).attr("y2", 90).attr("stroke", "#555");
                    gMini.append("rect").attr("x", mScale(birth)).attr("y", 80).attr("width", 40).attr("height", 20).attr("fill", "#555");
                    gMini.append("text").attr("x", mScale(birth)+5).attr("y", 93).text("Born").style("fill", "white").style("font-size", "10px");
                    gMini.append("rect").attr("x", mScale(first)).attr("y", 80).attr("width", mScale(last)-mScale(first)).attr("height", 20).attr("fill", "#c8e6c9");
                    gMini.append("text").attr("x", mScale(first)+5).attr("y", 93).text("Worked").style("fill", "#2e7d32").style("font-weight", "bold").style("font-size", "10px");

                    gMini.selectAll(".adot").data(works).enter().append("circle").attr("cx", w => mScale(w.year)).attr("cy", 90).attr("r", 6).attr("fill", "#fb8c00").style("cursor", "pointer").on("click", (e, w) => {
                        tooltip.attr("x", e.clientX - mini.node().getBoundingClientRect().left).attr("y", 20).text("Year: " + w.year).transition().duration(200).style("opacity", 1);
                    });

                    works.forEach((w, i) => {
                        const item = document.createElement("div");
                        item.className = "timeline-item";
                        item.style.animationDelay = `${i * 0.1}s`;
                        item.innerHTML = `<div style="font-weight:bold;">${w.year}</div><img src="${w.image_url}" class="thumb" style="width:60px; height:60px; cursor:pointer; object-fit:cover;"> <h4 style="margin:0; font-size:14px;">${w.title}</h4>`;
                        item.querySelector(".thumb").onclick = () => showFullImage(w.image_url);
                        list.appendChild(item);
                    });
                    document.getElementById('modal').style.display = 'block';
                };
            });
        }

        function showFullImage(url) {
            const viewer = document.getElementById('image-viewer');
            const img = document.getElementById('full-size-img');
            const palette = document.getElementById('palette');
            img.src = url;
            palette.innerHTML = "";
            viewer.style.display = 'flex';
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', {willReadFrequently: true});
                canvas.width = img.naturalWidth;
                canvas.height = img.naturalHeight;
                ctx.drawImage(img, 0, 0);
                const samples = [[0,0], [canvas.width/2, 0], [canvas.width-1, 0], [0, canvas.height-1], [canvas.width-1, canvas.height-1]];
                samples.forEach(s => {
                    const data = ctx.getImageData(s[0], s[1], 1, 1).data;
                    const hex = "#" + ((1 << 24) + (data[0] << 16) + (data[1] << 8) + data[2]).toString(16).slice(1);
                    const div = document.createElement('div');
                    div.className = 'color-swatch';
                    div.style.backgroundColor = hex;
                    div.onclick = () => { navigator.clipboard.writeText(hex); alert('Copied: ' + hex); };
                    palette.appendChild(div);
                });
            };
        }
    </script>
</body>
</html>
